version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aitutor_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: AITutorDb
    ports:
      - "5432:5432"
    volumes:
      - aitutor_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aitutor_vector_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - aitutor_qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  aitutor_pgdata:
  aitutor_qdrant_data:
